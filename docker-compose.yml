services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      DATABASE_URL: /app/data/budget.db
      BASE_URL: ${BASE_URL:-http://localhost:3000}
      CRON_SECRET: ${CRON_SECRET:-change_me}
      RESEND_API_KEY: ${RESEND_API_KEY:-re_example_key}
    volumes:
      - budget_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 5

  cron:
    image: alpine:3.20
    depends_on:
      - app
    environment:
      CRON_SECRET: ${CRON_SECRET:-change_me}
    command: >
      sh -c "
      apk add --no-cache curl &&
      echo '0 9 * * * curl -fsS \"http://app:3000/api/cron/reminders?key=$${CRON_SECRET}\" || true' > /etc/crontabs/root &&
      crond -f -l 8
      "
    restart: unless-stopped

volumes:
  budget_data:
